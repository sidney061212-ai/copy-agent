name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-copyagentd/go.mod
          cache-dependency-path: go-copyagentd/go.sum

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Run Go tests
        run: |
          cd go-copyagentd
          go test ./...

      - name: Go build smoke test
        run: |
          cd go-copyagentd
          go build -trimpath ./cmd/copyagentd

      - name: Shell syntax checks
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/build-dev.sh
