<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="720" viewBox="0 0 1800 720" role="img" aria-labelledby="title desc">
  <title id="title">copyagent custom C icon variants</title>
  <desc id="desc">Three refined Apple-style custom C icon variants: minimal, dimensional, and system.</desc>
  <defs>
    <radialGradient id="bgMinimal" cx="34%" cy="18%" r="92%"><stop offset="0" stop-color="#6AF4FF"/><stop offset="0.32" stop-color="#2563EB"/><stop offset="0.68" stop-color="#1E1B4B"/><stop offset="1" stop-color="#050816"/></radialGradient>
    <radialGradient id="bgDim" cx="28%" cy="12%" r="95%"><stop offset="0" stop-color="#B9FEFF"/><stop offset="0.22" stop-color="#26D9FF"/><stop offset="0.5" stop-color="#5B4DFF"/><stop offset="1" stop-color="#070617"/></radialGradient>
    <radialGradient id="bgSystem" cx="45%" cy="10%" r="92%"><stop offset="0" stop-color="#A7F3D0"/><stop offset="0.28" stop-color="#38BDF8"/><stop offset="0.62" stop-color="#334155"/><stop offset="1" stop-color="#0B1020"/></radialGradient>
    <radialGradient id="aurora" cx="18%" cy="8%" r="82%"><stop offset="0" stop-color="#FFFFFF" stop-opacity=".38"/><stop offset=".38" stop-color="#67E8F9" stop-opacity=".22"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <linearGradient id="cMinimal" x1="120" y1="95" x2="450" y2="440" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".42" stop-color="#BFF7FF"/><stop offset="1" stop-color="#8B7DFF"/></linearGradient>
    <linearGradient id="cDim" x1="100" y1="95" x2="455" y2="445" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".28" stop-color="#E0FCFF"/><stop offset=".62" stop-color="#54D9FF"/><stop offset="1" stop-color="#B794F6"/></linearGradient>
    <linearGradient id="cSystem" x1="120" y1="90" x2="445" y2="430" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#F8FAFC"/><stop offset=".48" stop-color="#BAE6FD"/><stop offset="1" stop-color="#60A5FA"/></linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#020617" flood-opacity=".26"/></filter>
    <filter id="glyphSoft" x="-30%" y="-30%" width="160%" height="170%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".34"/><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#67E8F9" flood-opacity=".2"/></filter>
    <filter id="glyphDeep" x="-40%" y="-40%" width="180%" height="190%"><feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#020617" flood-opacity=".48"/><feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#67E8F9" flood-opacity=".32"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="squircle"><rect x="0" y="0" width="420" height="420" rx="96"/></clipPath>
    <style>
      .title{font:800 30px -apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;fill:#0F172A;text-anchor:middle;letter-spacing:-.03em}.subtitle{font:500 15px -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,sans-serif;fill:#64748B;text-anchor:middle}.name{font:800 25px -apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif;fill:#111827;text-anchor:middle;letter-spacing:-.03em}.desc{font:500 15px -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,sans-serif;fill:#64748B;text-anchor:middle}.stroke{fill:none;stroke-linecap:round;stroke-linejoin:round}.shine{fill:none;stroke:#fff;stroke-linecap:round;stroke-linejoin:round;opacity:.56}.dot{fill:#A3FF6A;filter:url(#glow)}
    </style>
