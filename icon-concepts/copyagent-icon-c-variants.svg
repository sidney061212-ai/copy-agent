  <rect width="1800" height="720" fill="#F1F5F9"/>
  <text class="title" x="900" y="62">copyagent custom C — 3 refined variants</text>
  <text class="subtitle" x="900" y="94">A 更简洁 · B 更立体 · C 更系统感</text>

