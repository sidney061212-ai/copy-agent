    <g filter="url(#glyphSoft)">
      <path d="M257 120C215 99 164 100 121 124C65 155 31 213 31 291C31 369 65 427 121 458C164 482 217 482 260 459C278 450 300 455 311 472L327 496C272 539 190 550 119 517C33 477-20 392-20 291C-20 190 33 105 119 65C190 32 273 44 329 88L311 114C299 131 276 130 257 120Z" transform="translate(60 -4)" fill="url(#cSystem)"/>
