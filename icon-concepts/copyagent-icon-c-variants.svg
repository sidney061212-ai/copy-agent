    <g filter="url(#glyphDeep)">
      <path d="M261 117C214 92 154 94 105 122C43 158 5 221 5 306C5 392 43 455 105 490C155 519 216 518 264 491C284 480 309 486 322 505L342 535C280 586 184 600 103 561C7 516-51 420-51 306C-51 192 7 96 103 52C184 14 282 29 345 82L323 113C309 132 283 129 261 117Z" transform="translate(72 -26)" fill="url(#cDim)"/>
      <path d="M251 196C221 182 184 185 154 203C112 229 86 268 86 324C86 380 112 419 154 445C185 463 223 463 254 447C267 440 284 443 293 455L307 475C267 508 204 516 151 491C88 462 50 399 50 324C50 249 88 186 151 157C204 132 268 142 309 176L294 196C285 209 268 204 251 196Z" fill="#071022" opacity=".34"/>
