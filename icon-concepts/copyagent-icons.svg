<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="320" viewBox="0 0 1600 320" role="img" aria-labelledby="title desc">
  <title id="title">copyagent icon concepts</title>
  <desc id="desc">Five vector icon concepts for copyagent: mobile to clipboard, agent bridge, command bubble, file drop, and clipboard loop.</desc>
  <defs>
    <linearGradient id="blueViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25D9F8"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="mintBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2CF2A5"/>
      <stop offset="1" stop-color="#1A8CFF"/>
    </linearGradient>
    <linearGradient id="orangePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCB45"/>
      <stop offset="1" stop-color="#FF4D8D"/>
    </linearGradient>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4B5563"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="aquaGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7F9"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <style>
      .label{font:600 18px -apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;fill:#334155;text-anchor:middle}
      .sub{font:500 12px -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;fill:#64748B;text-anchor:middle}
      .white{fill:#fff}.strokeWhite{stroke:#fff;stroke-width:13;stroke-linecap:round;stroke-linejoin:round;fill:none}.dark{fill:#0F172A}.thinDark{stroke:#0F172A;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.9}
    </style>
  </defs>

  <rect width="1600" height="320" fill="#F8FAFC"/>

  <g transform="translate(30 28)">
    <rect x="0" y="0" width="260" height="230" rx="56" fill="url(#blueViolet)" filter="url(#softShadow)"/>
    <rect x="60" y="48" width="70" height="120" rx="18" fill="#FFFFFF" opacity="0.96"/>
    <rect x="78" y="62" width="34" height="6" rx="3" fill="#7C4DFF" opacity="0.55"/>
    <circle cx="95" cy="151" r="5" fill="#7C4DFF" opacity="0.55"/>
    <rect x="130" y="70" width="86" height="108" rx="18" fill="#FFFFFF" opacity="0.96"/>
    <rect x="151" y="46" width="44" height="38" rx="12" fill="#FFFFFF"/>
    <path d="M153 58h40" stroke="#7C4DFF" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <path d="M96 107h74" class="strokeWhite" opacity="0.68"/>
    <path d="M153 88l26 19-26 19" class="strokeWhite"/>
    <text class="label" x="130" y="266">01 手机 → 剪切板</text>
    <text class="sub" x="130" y="288">最直白，适合 App 图标</text>
  </g>

  <g transform="translate(350 28)">
    <rect x="0" y="0" width="260" height="230" rx="56" fill="url(#mintBlue)" filter="url(#softShadow)"/>
    <circle cx="130" cy="114" r="62" fill="#FFFFFF" opacity="0.96"/>
    <circle cx="106" cy="108" r="8" fill="#0EA5E9"/>
    <circle cx="154" cy="108" r="8" fill="#0EA5E9"/>
    <path d="M112 139c12 10 25 10 37 0" stroke="#0EA5E9" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M130 35v28M82 73L60 53M178 73l22-20" class="strokeWhite" opacity="0.9"/>
    <rect x="37" y="143" width="70" height="48" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <rect x="153" y="143" width="70" height="48" rx="14" fill="#FFFFFF" opacity="0.92"/>
    <path d="M107 167h46" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    <path d="M137 153l19 14-19 14" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text class="label" x="130" y="266">02 本机 Agent</text>
    <text class="sub" x="130" y="288">强调轻量机器人/路由器</text>
  </g>

  <g transform="translate(670 28)">
    <rect x="0" y="0" width="260" height="230" rx="56" fill="url(#orangePink)" filter="url(#softShadow)"/>
    <path d="M64 65h132c21 0 38 16 38 36v24c0 20-17 36-38 36h-54l-36 32v-32H64c-21 0-38-16-38-36v-24c0-20 17-36 38-36z" fill="#FFFFFF" opacity="0.96"/>
    <path d="M79 113h32M130 113h52" stroke="#FF6B61" stroke-width="12" stroke-linecap="round" opacity="0.88"/>
    <path d="M74 94l-18 19 18 19M185 94l18 19-18 19" stroke="#FF6B61" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="93" y="42" width="74" height="34" rx="13" fill="#FFFFFF" opacity="0.82"/>
    <path d="M111 58h38" stroke="#FF6B61" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <text class="label" x="130" y="266">03 聊天命令</text>
    <text class="sub" x="130" y="288">突出飞书/移动端指令入口</text>
  </g>

  <g transform="translate(990 28)">
    <rect x="0" y="0" width="260" height="230" rx="56" fill="url(#graphite)" filter="url(#softShadow)"/>
    <rect x="58" y="58" width="94" height="118" rx="18" fill="#FFFFFF" opacity="0.96"/>
    <path d="M128 58v37h24" fill="#E5E7EB"/>
    <path d="M128 58l24 37h-24z" fill="#CBD5E1"/>
    <rect x="118" y="109" width="90" height="68" rx="16" fill="#38BDF8"/>
    <path d="M139 131h48M139 153h34" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
    <path d="M91 124h52" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.82"/>
    <path d="M129 107l19 17-19 17" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text class="label" x="130" y="266">04 文件落地</text>
    <text class="sub" x="130" y="288">兼顾图片/文件保存能力</text>
  </g>

  <g transform="translate(1310 28)">
    <rect x="0" y="0" width="260" height="230" rx="56" fill="url(#aquaGreen)" filter="url(#softShadow)"/>
    <rect x="68" y="54" width="124" height="142" rx="24" fill="#FFFFFF" opacity="0.96"/>
    <rect x="99" y="37" width="62" height="42" rx="14" fill="#FFFFFF"/>
    <path d="M111 57h38" stroke="#22C55E" stroke-width="9" stroke-linecap="round" opacity="0.72"/>
    <path d="M104 113c16-22 51-22 67 0" class="thinDark"/>
    <path d="M174 95l3 29-29-3" class="thinDark"/>
    <path d="M157 145c-16 22-51 22-67 0" class="thinDark"/>
    <path d="M87 163l-3-29 29 3" class="thinDark"/>
    <text class="label" x="130" y="266">05 同步循环</text>
    <text class="sub" x="130" y="288">菜单栏/状态栏更耐看</text>
  </g>
</svg>
